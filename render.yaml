# Render.com blueprint - declarative deploy config.
# When you connect this GitHub repo to Render, it reads this file and
# pre-fills the service settings. You only need to set ANTHROPIC_API_KEY.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: justin-hatch-portfolio
    runtime: node
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      # SECRET - you set this once in the Render dashboard, not in the repo.
      - key: ANTHROPIC_API_KEY
        sync: false

      # Non-secret defaults you can override per-environment.
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: RATE_LIMIT_WINDOW_HOURS
        value: "24"
      - key: RATE_LIMIT_MAX_MESSAGES
        value: "30"
      - key: MAX_INPUT_CHARS
        value: "2000"
      - key: MAX_OUTPUT_TOKENS
        value: "600"

      # Pin Node so we don't get surprised by a major version bump.
      - key: NODE_VERSION
        value: "20"
