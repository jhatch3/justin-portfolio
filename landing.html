<style>
  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --ink: #0a2540;
    --ink-2: #2a4365;
    --ink-3: #5a7090;
    --accent: #1d4ed8;
    --accent-soft: #2563eb;
    --border: rgba(10,37,64,0.10);
    --border-strong: rgba(10,37,64,0.20);
    --shadow: 0 1px 2px rgba(10,37,64,0.04), 0 8px 24px rgba(10,37,64,0.06);
  }
  html { scroll-behavior: smooth; scroll-padding-top: 80px; }

  /* Mobile responsive overrides (≤768px). Inline-style padding wins over
     normal CSS, so we use !important here to tighten things on phones. */
  @media (max-width: 768px) {
    section { padding-top: 40px !important; padding-bottom: 40px !important; }
    #hero  { padding-top: 60px !important; padding-bottom: 90px !important; }
    /* nav: hide section-anchor row, keep name + social icons */
    .nav-sections { display: none !important; }
    /* container side padding */
    .container { padding-left: 18px !important; padding-right: 18px !important; }
    /* push social icons right when section anchors are hidden */
    .nav-icons { margin-left: auto !important; }
    /* show hamburger on mobile */
    .nav-hamburger { display: inline-flex !important; }
    /* hero CTAs all stay on one line on mobile - tighten gap + button padding */
    .hero-ctas { gap: 8px !important; flex-wrap: nowrap !important; }
    .hero-ctas > a:first-child { padding-left: 18px !important; padding-right: 18px !important; }
    .hero-ctas a[aria-label="Email"], .hero-ctas a[aria-label="Resume"], .hero-ctas a[aria-label="LinkedIn"] {
      width: 40px !important; height: 40px !important; flex-shrink: 0 !important;
    }
    /* hero photo smaller */
    img[alt="Justin Hatch"] { width: 110px !important; height: 110px !important; }
    /* Inter hero gap tightening */
    #hero > .container > div { gap: 24px !important; }
  }
  /* Hamburger is hidden on desktop */
  .nav-hamburger { display: none; }
  @media (max-width: 480px) {
    section { padding-top: 32px !important; padding-bottom: 32px !important; }
  }

  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink-2);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
  }
  * { box-sizing: border-box; }
  ::selection { background: rgba(29,78,216,0.18); color: var(--ink); }
  a { color: var(--accent); text-decoration: none; transition: opacity 0.15s; }
  a:hover { opacity: 0.7; }
  button { font-family: inherit; cursor: pointer; }

  h1, h2, h3 { color: var(--ink); font-weight: 600; letter-spacing: -0.02em; margin: 0; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <!-- Modular data: profile must load first (creates window.JH_DATA), rest extend it. -->
  <script src="data/profile.js"></script>
  <script src="data/projects.js"></script>
  <script src="data/experience.js"></script>
  <script src="data/education.js"></script>
  <script src="data/skills.js"></script>
  <script src="data/writing.js"></script>
  <script src="data/now.js"></script>

  <script type="text/babel">
    const D = window.JH_DATA;

    // ─── cn() ─────────────────────────────────────────────────────────────────
    // Tiny shadcn-style class joiner (no tailwind-merge - keep it light).
    const cn = (...args) => args.flat().filter(Boolean).join(' ');

    // ─── useOutsideClick ─────────────────────────────────────────────────────
    const useOutsideClick = (ref, callback) => {
      React.useEffect(() => {
        const listener = (e) => {
          if (!ref.current || ref.current.contains(e.target)) return;
          callback(e);
        };
        document.addEventListener('mousedown', listener);
        document.addEventListener('touchstart', listener);
        return () => {
          document.removeEventListener('mousedown', listener);
          document.removeEventListener('touchstart', listener);
        };
      }, [ref, callback]);
    };

    // ─── Terminal (animated typing demo) ─────────────────────────────────────
    const useInView = (ref, once = true) => {
      const [inView, setInView] = React.useState(false);
      const triggered = React.useRef(false);
      React.useEffect(() => {
        const el = ref.current;
        if (!el || (once && triggered.current)) return;
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting && !triggered.current) {
            setInView(true);
            if (once) { triggered.current = true; observer.disconnect(); }
          }
        }, { threshold: 0.1 });
        observer.observe(el);
        return () => observer.disconnect();
      }, [ref, once]);
      return inView;
    };

    const tokenizeBash = (text) => {
      const tokens = [];
      const words = text.split(/(\s+)/);
      let isFirst = true;
      for (const w of words) {
        if (/^\s+$/.test(w))                           { tokens.push({ type: 'default', value: w }); continue; }
        if (w.startsWith('#'))                          { tokens.push({ type: 'comment', value: w }); continue; }
        if (w.startsWith('$'))                          { tokens.push({ type: 'variable', value: w }); isFirst = false; continue; }
        if (w.startsWith('--') || w.startsWith('-'))    { tokens.push({ type: 'flag', value: w }); isFirst = false; continue; }
        if (/^["'].*["']$/.test(w))                     { tokens.push({ type: 'string', value: w }); isFirst = false; continue; }
        if (/^\d+$/.test(w))                            { tokens.push({ type: 'number', value: w }); isFirst = false; continue; }
        if (/^[|>&<]+$/.test(w))                        { tokens.push({ type: 'operator', value: w }); isFirst = true; continue; }
        if (w.includes('/') || w.startsWith('.') || w.startsWith('~')) { tokens.push({ type: 'path', value: w }); isFirst = false; continue; }
        if (isFirst)                                    { tokens.push({ type: 'command', value: w }); isFirst = false; continue; }
        tokens.push({ type: 'default', value: w });
      }
      return tokens;
    };
    const tokenColors = {
      command: 'text-emerald-400', flag: 'text-sky-400', string: 'text-amber-300',
      number: 'text-purple-400', operator: 'text-red-400', path: 'text-cyan-300',
      variable: 'text-pink-400', comment: 'text-neutral-500', default: 'text-neutral-300',
    };
    const SyntaxHighlightedText = ({ text }) => (
      <>{tokenizeBash(text).map((t, i) => <span key={i} className={tokenColors[t.type]}>{t.value}</span>)}</>
    );

    const Terminal = ({
      commands = [], outputs = {}, username = 'justin@portfolio',
      className, typingSpeed = 50, delayBetweenCommands = 800, initialDelay = 500,
    }) => {
      const containerRef = React.useRef(null);
      const contentRef = React.useRef(null);
      const inView = useInView(containerRef);
      const [lines, setLines] = React.useState([]);
      const [currentText, setCurrentText] = React.useState('');
      const [commandIdx, setCommandIdx] = React.useState(0);
      const [charIdx, setCharIdx] = React.useState(0);
      const [outputIdx, setOutputIdx] = React.useState(-1);
      const [phase, setPhase] = React.useState('idle');
      const [cursorVisible, setCursorVisible] = React.useState(true);

      const currentCommand = commands[commandIdx] || '';
      const currentOutputs = React.useMemo(() => outputs[commandIdx] || [], [outputs, commandIdx]);
      const isLastCommand = commandIdx === commands.length - 1;

      React.useEffect(() => {
        if (!inView || phase !== 'idle') return;
        const t = setTimeout(() => setPhase('typing'), initialDelay);
        return () => clearTimeout(t);
      }, [inView, phase, initialDelay]);

      React.useEffect(() => {
        if (phase !== 'typing') return;
        if (charIdx < currentCommand.length) {
          const t = setTimeout(() => {
            setCurrentText(currentCommand.slice(0, charIdx + 1));
            setCharIdx(c => c + 1);
          }, typingSpeed + Math.random() * 30);
          return () => clearTimeout(t);
        } else {
          const t = setTimeout(() => setPhase('executing'), 80);
          return () => clearTimeout(t);
        }
      }, [phase, charIdx, currentCommand, typingSpeed]);

      React.useEffect(() => {
        if (phase !== 'executing') return;
        setLines(prev => [...prev, { type: 'command', content: currentCommand }]);
        setCurrentText('');
        if (currentOutputs.length > 0) { setOutputIdx(0); setPhase('outputting'); }
        else if (isLastCommand) setPhase('done');
        else setPhase('pausing');
      }, [phase, currentCommand, currentOutputs.length, isLastCommand]);

      React.useEffect(() => {
        if (phase !== 'outputting') return;
        if (outputIdx >= 0 && outputIdx < currentOutputs.length) {
          const t = setTimeout(() => {
            setLines(prev => [...prev, { type: 'output', content: currentOutputs[outputIdx] }]);
            setOutputIdx(i => i + 1);
          }, 150);
          return () => clearTimeout(t);
        } else if (outputIdx >= currentOutputs.length) {
          const t = setTimeout(() => setPhase(isLastCommand ? 'done' : 'pausing'), 300);
          return () => clearTimeout(t);
        }
      }, [phase, outputIdx, currentOutputs, isLastCommand]);

      React.useEffect(() => {
        if (phase !== 'pausing') return;
        const t = setTimeout(() => {
          setCharIdx(0); setOutputIdx(-1);
          setCommandIdx(c => c + 1);
          setPhase('typing');
        }, delayBetweenCommands);
        return () => clearTimeout(t);
      }, [phase, delayBetweenCommands]);

      React.useEffect(() => {
        const i = setInterval(() => setCursorVisible(v => !v), 530);
        return () => clearInterval(i);
      }, []);

      React.useEffect(() => {
        if (contentRef.current) contentRef.current.scrollTop = contentRef.current.scrollHeight;
      }, [lines, phase]);

      const prompt = (
        <span className="text-neutral-500">
          <span className="text-sky-500">{username}</span>
          <span className="text-emerald-600">:</span>
          <span className="text-sky-400">~</span>
          <span className="text-neutral-500">$</span>{' '}
        </span>
      );

      return (
        <div ref={containerRef} className={cn('mx-auto w-full max-w-5xl px-4 font-mono text-base', className)}>
          <div className="overflow-hidden rounded-lg border border-neutral-800 bg-neutral-900 shadow-2xl">
            <div className="flex items-center gap-2 bg-neutral-800 px-4 py-3">
              <div className="flex items-center gap-1.5">
                <div className="h-3 w-3 rounded-full bg-red-500" />
                <div className="h-3 w-3 rounded-full bg-yellow-500" />
                <div className="h-3 w-3 rounded-full bg-green-500" />
              </div>
              <div className="flex-1 text-center">
                <span className="truncate text-xs text-neutral-400">{username} — bash</span>
              </div>
              <div className="w-[52px]" />
            </div>
            <div ref={contentRef} className="h-[36rem] overflow-y-auto p-6 font-mono">
              {lines.map((line, i) => (
                <div key={i} className="leading-relaxed whitespace-pre-wrap">
                  {line.type === 'command' ? (
                    <span>{prompt}<SyntaxHighlightedText text={line.content} /></span>
                  ) : (
                    <span className="text-neutral-400">{line.content}</span>
                  )}
                </div>
              ))}
              {phase === 'typing' && (
                <div className="leading-relaxed whitespace-pre-wrap">
                  {prompt}
                  <SyntaxHighlightedText text={currentText} />
                  <span className="ml-0.5 inline-block h-4 w-2 bg-neutral-300 align-middle" />
                </div>
              )}
              {(phase === 'done' || phase === 'pausing' || phase === 'outputting') && (
                <div className="leading-relaxed whitespace-pre-wrap">
                  {prompt}
                  <span className={cn('inline-block h-4 w-2 bg-neutral-300 align-middle transition-opacity duration-100', !cursorVisible && 'opacity-0')} />
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // ─── Interactive bot terminal ────────────────────────────────────────────
    // Connected to /api/chat (same backend as the desktop chat). Boots with a
    // neofetch as the welcome card, then awaits input. Special commands:
    // whoami / neofetch · help · projects · clear · anything else -> /api/chat.
    const NEOFETCH_OUTPUT = [
      "              .:'                 justin@portfolio",
      "          __ :'__                 ────────────────────────────────────",
      "       .'`__`-'__``.              Role         AI / ML Engineer",
      "      :__________.-'              Available    June 2026",
      "      :_________:                 Currently    Modern Amenities · OBG (Lead SWE)",
      "       :_________`-;              Stack        Python · TypeScript · Claude · FastAPI",
      "        `.__.-.__.'               Location     Eugene, OR · Remote-friendly",
      "                                  Education    B.S. CS · Univ. of Oregon",
      "                                  Projects     13 across AI/ML, blockchain, data",
      "                                  GitHub       github.com/jhatch3",
      "                                  Email        jjhatch03@gmail.com",
    ].join('\n');

    const HELP_OUTPUT = [
      "Commands:",
      "  whoami      Identity card (default)",
      "  projects    List my projects",
      "  clear       Clear the screen",
      "  help        This message",
      "",
      "Or ask anything in plain English. Streaming Claude via /api/chat.",
    ].join('\n');

    const projectsOutput = () =>
      D.projects.map(p =>
        '  ' + p.id.padEnd(22) + (p.name + (p.url ? '  ↗' : '')).padEnd(28) + (p.status || '')
      ).join('\n');

    const BotTerminal = ({ username = 'justin@portfolio' }) => {
      const containerRef = React.useRef(null);
      const contentRef = React.useRef(null);
      const inputRef = React.useRef(null);
      const inView = useInView(containerRef);
      const [booted, setBooted] = React.useState(false);
      const [history, setHistory] = React.useState([]);
      const [conversation, setConversation] = React.useState([]);
      const [input, setInput] = React.useState('');
      const [sending, setSending] = React.useState(false);
      const [cursorVisible, setCursorVisible] = React.useState(true);

      // Boot animation: when the section enters the viewport, populate history
      // with the neofetch as if the user had typed `whoami`.
      React.useEffect(() => {
        if (!inView || booted) return;
        setHistory([
          { role: 'command', text: 'whoami' },
          { role: 'output',  text: NEOFETCH_OUTPUT },
          { role: 'output',  text: 'Type ' + '`help`' + ' for commands. Or ask me anything.' },
        ]);
        setBooted(true);
      }, [inView, booted]);

      // Listen for chip clicks (suggestion chips above the terminal dispatch
      // a custom event so we don't have to lift state up).
      React.useEffect(() => {
        const handler = (e) => {
          if (e.detail) submit(null, e.detail);
        };
        window.addEventListener('bot-terminal-submit', handler);
        return () => window.removeEventListener('bot-terminal-submit', handler);
      }, [conversation, sending]);

      // Cursor blink for empty input
      React.useEffect(() => {
        const i = setInterval(() => setCursorVisible(v => !v), 530);
        return () => clearInterval(i);
      }, []);

      // Auto-scroll on history change
      React.useEffect(() => {
        if (contentRef.current) contentRef.current.scrollTop = contentRef.current.scrollHeight;
      }, [history, sending]);

      const focusInput = () => inputRef.current?.focus();

      const appendOutput = (text) => setHistory(h => [...h, { role: 'output', text }]);
      const appendError  = (text) => setHistory(h => [...h, { role: 'error',  text }]);

      const submit = async (e, cmdOverride) => {
        if (e) e.preventDefault();
        const cmd = (cmdOverride !== undefined ? cmdOverride : input).trim();
        if (!cmd || sending) return;
        setInput('');

        // Echo the typed command into history.
        setHistory(h => [...h, { role: 'command', text: cmd }]);

        const lower = cmd.toLowerCase();

        if (lower === 'clear') { setHistory([]); setConversation([]); return; }
        if (lower === 'help')  { appendOutput(HELP_OUTPUT); return; }
        if (lower === 'whoami' || lower.startsWith('neofetch')) { appendOutput(NEOFETCH_OUTPUT); return; }
        if (lower === 'projects' || lower === 'ls projects') { appendOutput(projectsOutput()); return; }

        // Otherwise, send to /api/chat with SSE streaming.
        const nextConvo = [...conversation, { role: 'user', content: cmd }];
        setConversation(nextConvo);
        setSending(true);
        // Add an empty output line that we'll append deltas into.
        setHistory(h => [...h, { role: 'output', text: '', streaming: true }]);

        try {
          const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: nextConvo }),
          });
          if (!res.ok) {
            const j = await res.json().catch(() => ({}));
            throw new Error(j.message || ('HTTP ' + res.status + ' from /api/chat'));
          }
          if (!res.body) throw new Error('No response body');
          const reader = res.body.getReader();
          const dec = new TextDecoder();
          let buf = '';
          let assistantText = '';
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += dec.decode(value, { stream: true });
            let idx;
            while ((idx = buf.indexOf('\n\n')) !== -1) {
              const raw = buf.slice(0, idx).trim();
              buf = buf.slice(idx + 2);
              if (!raw.startsWith('data:')) continue;
              let evt;
              try { evt = JSON.parse(raw.slice(5).trim()); } catch { continue; }
              if (evt.type === 'delta') {
                assistantText += evt.text;
                setHistory(h => {
                  const c = h.slice();
                  c[c.length - 1] = { ...c[c.length - 1], text: assistantText };
                  return c;
                });
              } else if (evt.type === 'error') {
                throw new Error(evt.message || 'stream error');
              }
            }
          }
          // Persist the assistant turn in conversation memory.
          if (assistantText) setConversation(c => [...c, { role: 'assistant', content: assistantText }]);
        } catch (err) {
          // Replace the empty streaming line with an error line, or append.
          setHistory(h => {
            const c = h.slice();
            const last = c[c.length - 1];
            if (last && last.streaming && !last.text) c.pop();
            c.push({ role: 'error', text: 'Error: ' + (err.message || String(err)) +
              (err.message && err.message.includes('Failed to fetch') ? '  (chat needs the Express server - run npm start in /server, or visit the deployed site)' : '') });
            return c;
          });
        } finally {
          setSending(false);
          setHistory(h => h.map((line, i) =>
            i === h.length - 1 && line.streaming ? { ...line, streaming: false } : line
          ));
          setTimeout(focusInput, 0);
        }
      };

      const Prompt = (
        <span className="text-neutral-500 select-none">
          <span className="text-sky-500">{username}</span>
          <span className="text-emerald-600">:</span>
          <span className="text-sky-400">~</span>
          <span className="text-neutral-500">$</span>{' '}
        </span>
      );

      return (
        <div ref={containerRef} className="mx-auto w-full max-w-5xl px-4 font-mono text-base">
          <div className="overflow-hidden rounded-lg border border-neutral-800 bg-neutral-900 shadow-2xl"
               onClick={focusInput}>
            {/* Title bar */}
            <div className="flex items-center gap-2 bg-neutral-800 px-4 py-3">
              <div className="flex items-center gap-1.5">
                <div className="h-3 w-3 rounded-full bg-red-500" />
                <div className="h-3 w-3 rounded-full bg-yellow-500" />
                <div className="h-3 w-3 rounded-full bg-green-500" />
              </div>
              <div className="flex-1 text-center">
                <span className="truncate text-xs text-neutral-400">{username} — bash</span>
              </div>
              <div className="w-[52px]" />
            </div>

            {/* Body */}
            <div ref={contentRef} className="h-[36rem] overflow-y-auto p-6 font-mono text-neutral-200 cursor-text">
              {history.map((line, i) => (
                <div key={i} className="leading-relaxed whitespace-pre-wrap">
                  {line.role === 'command' ? (
                    <span>{Prompt}<SyntaxHighlightedText text={line.text} /></span>
                  ) : line.role === 'error' ? (
                    <span className="text-red-400">{line.text}</span>
                  ) : (
                    <span className="text-neutral-300">{line.text}</span>
                  )}
                </div>
              ))}

              {/* Active prompt with input */}
              <form onSubmit={submit} className="leading-relaxed whitespace-pre-wrap flex items-center">
                {Prompt}
                <input
                  ref={inputRef}
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  disabled={sending}
                  autoFocus={booted}
                  spellCheck={false}
                  autoCorrect="off"
                  autoCapitalize="off"
                  className="flex-1 bg-transparent border-0 outline-none text-neutral-200 font-mono text-base"
                  style={{
                    caretColor: 'transparent',  // hide native caret, draw our own
                  }}
                  placeholder={sending ? '' : 'ask anything · or try whoami / projects / help'}
                />
                {/* Block cursor */}
                <span className="ml-0.5 inline-block h-4 w-2 bg-neutral-300 align-middle"
                  style={{ opacity: sending ? 0 : (cursorVisible ? 1 : 0), transition: 'opacity 0.1s' }} />
              </form>

              {sending && (
                <div className="text-neutral-500 text-sm mt-1">streaming…</div>
              )}
            </div>
          </div>
        </div>
      );
    };
    // ─── /BotTerminal ────────────────────────────────────────────────────────

    // ─── ExpandableCardDemo (light theme, CSS transitions, no motion) ────────
    // Wired to ALL of Justin's projects from data.js, with search + tag filter.
    const expandCards = D.projects.map(p => ({
      id: p.id,
      title: p.name,
      description: p.subtitle,
      ctaText: p.url ? 'GitHub ↗' : 'View',
      ctaLink: p.url || '#projects',
      bullets: p.bullets || [],
      tags: p.tags,
      status: p.status,
      initials: p.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase(),
    }));

    const ProjectInitialsTile = ({ initials, size = 'sm' }) => (
      <div className={cn(
        'flex items-center justify-center rounded-lg font-mono font-bold tracking-tighter',
        size === 'sm' ? 'h-14 w-14 text-base' : 'h-80 w-full text-6xl',
      )} style={{
        background: 'linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 50%, #a5b4fc 100%)',
        color: 'rgba(10,37,64,0.55)',
      }}>{initials}</div>
    );

    const ExpandableCardDemo = () => {
      const [active, setActive] = React.useState(null);
      const [query, setQuery] = React.useState('');
      const [activeTags, setActiveTags] = React.useState([]);
      const ref = React.useRef(null);

      const allTags = React.useMemo(() => {
        const counts = {};
        expandCards.forEach(c => c.tags.forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
        return Object.keys(counts).sort((a, b) => counts[b] - counts[a]).map(t => ({ tag: t, count: counts[t] }));
      }, []);

      const toggleTag = (t) => setActiveTags(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t]);

      const filtered = expandCards.filter(c => {
        if (query.trim()) {
          const q = query.toLowerCase();
          const hay = `${c.title} ${c.description} ${c.tags.join(' ')} ${(c.bullets || []).join(' ')}`.toLowerCase();

        return true;

      React.useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') setActive(null); };

        window.addEventListener('keydown', onKey);

                </button>
                <div ref={ref} className="w-full max-w-[560px] max-h-[90vh] flex flex-col bg-white rounded-3xl overflow-hidden shadow-2xl animate-[scaleIn_0.18s_ease-out]">
                  <ProjectInitialsTile initials={active.initials} size="lg" />
                  <div className="flex justify-between items-start p-5 gap-4">

              <span style={{ fontSize: 12, color: 'var(--ink-3)', fontFamily: "'JetBrains Mono', monospace", marginLeft: 4 }}>
                {filtered.length}/{expandCards.length}
              </span>
            </div>
            <div className="flex gap-1.5 flex-wrap mt-3">
              {allTags.map(({ tag, count }) => {
                const active = activeTags.includes(tag);
                return (
                  <button key={tag} onClick={() => toggleTag(tag)}

                      fontSize: 11, padding: '4px 11px', borderRadius: 999,
                      border: active ? '0.5px solid var(--accent)' : '0.5px solid var(--border-strong)',

                      color: active ? 'var(--accent)' : 'var(--ink-2)',

    // ─── FlipWords (CSS-keyframe port of Aceternity's flip-words) ───────────
    // Cycles through words; each word fades+blur-clears letter-by-letter on entry.
    const FlipWords = ({ words, duration = 3000, className }) => {
      const [idx, setIdx] = React.useState(0);
      React.useEffect(() => {
        const t = setTimeout(() => setIdx(i => (i + 1) % words.length), duration);
        return () => clearTimeout(t);
      }, [idx, duration, words.length]);

      const word = words[idx];
      const letters = word.split('');

      return (
        <span className={cn('z-10 inline-block relative text-left px-1', className)} style={{ verticalAlign: 'baseline' }}>
          <span className="inline-block whitespace-nowrap" key={idx}>
            {letters.map((letter, i) => (
              <span key={`${idx}-${i}`} className="inline-block"
                style={{
                  animation: `flipLetter 0.45s ease-out ${i * 0.045}s both`,
                  whiteSpace: letter === ' ' ? 'pre' : 'normal',
                }}>
                {letter === ' ' ? ' ' : letter}
              </span>
            ))}
          </span>
          <style>{`
            @keyframes flipLetter {
              from { opacity: 0; transform: translateY(10px); filter: blur(8px); }
              to   { opacity: 1; transform: translateY(0);   filter: blur(0);   }
            }
          `}</style>
        </span>
      );

            ].map(s => (
              <a key={s.label} href={s.href} target={s.target} rel={s.target ? 'noopener noreferrer' : undefined}
                aria-label={s.label} title={s.label}
                style={{
                  width: 40, height: 40, borderRadius: '50%',
                  display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                  color: 'var(--ink-3)', background: 'transparent',
                  border: '1px solid var(--border)', transition: 'color 0.15s, border-color 0.15s',
                }}
                onMouseEnter={(e) => { e.currentTarget.style.color = 'var(--accent)'; e.currentTarget.style.borderColor = 'var(--accent)'; }}
                onMouseLeave={(e) => { e.currentTarget.style.color = 'var(--ink-3)'; e.currentTarget.style.borderColor = 'var(--border)'; }}
              >{s.icon}</a>
            ))}
          </div>
          <div style={{
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            flexWrap: 'wrap', gap: 12, width: '100%', maxWidth: 600,
            fontSize: 12, color: 'var(--ink-3)',
          }}>
            <span>© {new Date().getFullYear()} {D.name}. Built with React, Tailwind, Claude.</span>
            <a href="desktop.html" style={{ color: 'var(--accent)', fontWeight: 500 }}>Interactive mode ↗</a>
          </div>
        </Container>
      </footer>
    );

    // ─── Suggestion chips that seed the bot terminal via a custom event ─────
    const SUGGESTIONS = [
      'whoami',
      'projects',
      'tell me about Lethe',
      'what is Justin looking for?',
      'help',
    ];
    const SuggestionChips = () => {
      const fire = (text) => window.dispatchEvent(new CustomEvent('bot-terminal-submit', { detail: text }));
      return (
        <div style={{
          display: 'flex', gap: 8, flexWrap: 'wrap', justifyContent: 'center',
          maxWidth: 920, margin: '0 auto 18px', padding: '0 28px',
        }}>
          <span style={{ fontSize: 12, color: 'var(--ink-3)', alignSelf: 'center', marginRight: 4 }}>
            try:
          </span>
          {SUGGESTIONS.map((s, i) => (
            <button key={i} onClick={() => fire(s)} style={{
              fontSize: 12.5, padding: '6px 14px', borderRadius: 999,
              background: i === 0 ? 'var(--accent)' : 'rgba(29,78,216,0.06)',
              color: i === 0 ? 'white' : 'var(--accent)',
              border: i === 0 ? '0.5px solid transparent' : '0.5px solid rgba(29,78,216,0.2)',
              fontFamily: 'inherit', fontWeight: 500, cursor: 'pointer',
              transition: 'background 0.15s, transform 0.1s',
              boxShadow: i === 0 ? '0 4px 12px rgba(29,78,216,0.25)' : 'none',
            }}
              onMouseEnter={(e) => { e.currentTarget.style.transform = 'translateY(-1px)'; }}
              onMouseLeave={(e) => { e.currentTarget.style.transform = ''; }}
            >{s}</button>
          ))}
        </div>
      );
    };

    // ─── Bot terminal section ────────────────────────────────────────────────
    const BotTerminalSection = () => (
      <section id="ask" style={{ padding: '64px 0 100px', animation: 'fadeUp 0.7s ease-out' }}>
        <Container>
          <SectionHeader
            eyebrow="Ask me anything"
            title="Live terminal, real chatbot."
            sub="Same Claude backend powering /desktop. Click a suggestion below or type your own at the prompt."
          />
        </Container>
        <SuggestionChips />
        <BotTerminal />
      </section>
    );

    // ─── Timeline (Aceternity port: scroll-progress gradient line, no motion) ──
    // Vanilla scroll listener computes a 0..1 progress value the gradient bar
    // reads via inline style. Same effect as motion's useScroll/useTransform.
    const Timeline = ({ data, dotColor = 'bg-blue-500' }) => {
      const containerRef = React.useRef(null);
      const stripRef = React.useRef(null);
      const [progress, setProgress] = React.useState(0);
      const [stripHeight, setStripHeight] = React.useState(0);

      React.useEffect(() => {
        if (stripRef.current) setStripHeight(stripRef.current.offsetHeight);
      }, [data]);

      React.useEffect(() => {
        const compute = () => {
          if (!containerRef.current) return;
          const r = containerRef.current.getBoundingClientRect();
          const wh = window.innerHeight;
          // Start filling when top reaches 10% of viewport, end when bottom
          // hits 50% of viewport.
          const startScroll = wh * 0.1 - r.top;
          const totalScroll = r.height - wh * 0.5 + wh * 0.1;
          const p = totalScroll > 0 ? startScroll / totalScroll : 0;
          setProgress(Math.max(0, Math.min(1, p)));
        };
        compute();
        window.addEventListener('scroll', compute, { passive: true });
        window.addEventListener('resize', compute);
        return () => {
          window.removeEventListener('scroll', compute);
          window.removeEventListener('resize', compute);
        };
      }, []);

      return (
        <div ref={containerRef} className="relative w-full">
          <div ref={stripRef} className="relative max-w-5xl mx-auto pb-12">
            {data.map((item, i) => (
              <div key={i} className="flex justify-start pt-10 md:pt-24 md:gap-10">
                {/* Sticky left rail with year/title */}
                <div className="sticky flex flex-col md:flex-row z-10 items-center top-32 self-start max-w-xs lg:max-w-sm md:w-full">
                  <div className="h-10 absolute left-3 md:left-3 w-10 rounded-full flex items-center justify-center"
                       style={{ background: 'var(--bg)' }}>
                    <div className={`h-3.5 w-3.5 rounded-full ${dotColor}`} style={{ boxShadow: '0 0 0 4px rgba(29,78,216,0.10)' }} />
                  </div>
                  <h3 className="hidden md:block text-2xl md:pl-20 md:text-4xl font-bold"
                      style={{ color: 'var(--ink-3)', letterSpacing: '-0.025em' }}>
                    {item.title}
                  </h3>
                </div>
                {/* Right column with content */}
                <div className="relative pl-20 pr-2 md:pl-4 w-full">
                  <h3 className="md:hidden block text-xl mb-3 text-left font-bold"
                      style={{ color: 'var(--ink-3)' }}>
                    {item.title}
                  </h3>
                  {item.content}
                </div>
              </div>
            ))}
            {/* Progress strip */}
            <div style={{
              position: 'absolute', left: 32, top: 0, height: stripHeight, width: 2,
              background: 'linear-gradient(to bottom, transparent 0%, rgba(10,37,64,0.12) 10%, rgba(10,37,64,0.12) 90%, transparent 100%)',
              maskImage: 'linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%)',
              WebkitMaskImage: 'linear-gradient(to bottom, transparent 0%, black 8%, black 92%, transparent 100%)',
            }}>
              <div style={{
                position: 'absolute', inset: 0, top: 0, width: 2,
                height: (progress * stripHeight) + 'px',
                background: 'linear-gradient(to top, #2563eb 0%, #8b5cf6 60%, transparent 100%)',
                opacity: progress > 0.02 ? 1 : 0,
                borderRadius: 9999,
                transition: 'opacity 0.2s',
              }} />
            </div>
          </div>
        </div>
      );
    };

    // ─── Education (flat card, no year-by-year) ─────────────────────────────
    const EducationSection = () => (
      <section id="education" style={{ padding: '64px 0', animation: 'fadeUp 0.7s ease-out' }}>
        <Container>
          <SectionHeader eyebrow="Education" title="University of Oregon"
            sub={`${D.degree} · graduating ${D.graduating}.`} />
          <div style={{
            background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 14,
            padding: '24px 26px', boxShadow: 'var(--shadow)',
          }}>
            <div style={{ fontSize: 18, fontWeight: 600, color: 'var(--ink)', marginBottom: 4, letterSpacing: '-0.01em' }}>
              {D.degree}
            </div>
            <div style={{ fontSize: 14, color: 'var(--ink-3)', marginBottom: 16, fontFamily: "'JetBrains Mono', monospace" }}>
              {D.school} · graduating {D.graduating}
            </div>
            <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--accent)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 10 }}>
              Honors &amp; awards
            </div>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {(D.honors || []).map(h => <Tag key={h}>{h}</Tag>)}
            </div>
          </div>
        </Container>
      </section>
    );

    // ─── Projects (expandable card grid - the prior 'old way' format) ──────
    const ProjectsCardSection = () => (
      <section id="projects" style={{ padding: '64px 0', animation: 'fadeUp 0.75s ease-out' }}>
        <Container>
          <SectionHeader eyebrow="Selected Work" title="Projects"
            sub={`${D.projects.length} projects across AI/ML, blockchain, and data infrastructure. Click any to expand.`} />
          <ExpandableCardDemo />
        </Container>
      </section>
    );

    // ─── App ──────────────────────────────────────────────────────────────────
    const App = () => (
      <>
        <Nav />
        <Hero />
        <Experience />
        <ProjectsCardSection />
        <EducationSection />
        <Writing />
        <Skills />
        <ResumeEmbed />
        <Contact />
        <Footer />
      </>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
